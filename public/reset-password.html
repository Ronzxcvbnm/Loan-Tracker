<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loan Tracker | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260331a" />
    <script defer src="reset-password.js?v=20260331a"></script>
  </head>
  <body>
    <div class="page-shell">
      <div class="backdrop-glow glow-top"></div>
      <div class="backdrop-glow glow-bottom"></div>

      <div class="floating-scene" aria-hidden="true">
        <span class="float-item cube item-1"></span>
        <span class="float-item piggy item-5"></span>
        <span class="float-item coin item-8"></span>
      </div>

      <main class="auth-layout">
        <section class="brand-panel">
          <div class="brand-copy">
            <p class="eyebrow">Secure account recovery</p>
            <h1 class="brand-title">
              <span>Reset</span>
              <span>Password</span>
            </h1>
            <p class="brand-text">
              Create a new password for your Loan Tracker account using the reset link sent to your email.
            </p>
          </div>
        </section>

        <section class="card-panel">
          <div class="auth-card">
            <div class="card-sheen"></div>
            <div class="card-topline"></div>

            <div id="statusBanner" class="status-banner" hidden></div>

            <form id="resetPasswordForm" class="auth-form is-active" novalidate>
              <div class="form-header">
                <h2>RESET PASSWORD</h2>
                <p id="resetPasswordDescription">Checking your reset link...</p>
              </div>

              <p class="otp-note" id="resetPasswordIdentity" hidden></p>

              <label class="field-group">
                <span>New password</span>
                <input
                  type="password"
                  name="newPassword"
                  placeholder="At least 8 characters"
                  autocomplete="new-password"
                  minlength="8"
                  required
                />
              </label>

              <label class="field-group">
                <span>Confirm new password</span>
                <input
                  type="password"
                  name="confirmPassword"
                  placeholder="Re-enter your new password"
                  autocomplete="new-password"
                  minlength="8"
                  required
                />
              </label>

              <button type="submit" class="action-button">Reset Password</button>

              <p class="form-switch">
                Remembered your password?
                <button type="button" class="switch-link" data-back-to-login>Back to login</button>
              </p>
            </form>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
